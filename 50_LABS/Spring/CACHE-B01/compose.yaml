services:
  redis:
    image: redis:7-alpine
    container_name: spring-cache-b01-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "no"
      - --save
      - ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
