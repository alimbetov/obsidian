name: Repair Mermaid Labels

on:
  push:
    branches:
      - agent/knowledge-map-foundation
    paths:
      - .github/scripts/repair_mermaid_labels.py
      - .github/workflows/repair-mermaid.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout learning branch
        uses: actions/checkout@v4
        with:
          ref: agent/knowledge-map-foundation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic Mermaid repairs
        run: python .github/scripts/repair_mermaid_labels.py

      - name: Commit repaired diagrams
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No Mermaid repairs were required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "10_CONCEPTS/Spring/Core/Bean Lifecycle from Definition to Destruction.md" \
            "10_CONCEPTS/Spring/Core/Configuration Profiles and Externalized Properties.md" \
            "10_CONCEPTS/Spring/Core/Spring Core Foundations.md" \
            "10_CONCEPTS/Spring/Testing/Spring TestContext and Test Slices.md" \
            "30_CERTIFICATIONS/Spring/2V0-72.22/CORE-B01/CORE-B01 Cards.md" \
            "30_CERTIFICATIONS/Spring/2V0-72.22/Spring Testing Roadmap.md" \
            "40_PRODUCTION_CASES/Spring/Bean Lifecycle Production Cases.md" \
            "40_PRODUCTION_CASES/Spring/Dependency Resolution Production Cases.md"
          git commit -m "fix: repair Mermaid labels across learning diagrams"
          git push origin HEAD:agent/knowledge-map-foundation
