name: JAVA-B02 Proof

on:
  pull_request:
    paths:
      - "10_CONCEPTS/Java/Core/Java Control Flow and Pattern Switch.md"
      - "30_CERTIFICATIONS/Java/JAVA-B02/**"
      - "50_LABS/Java/JAVA-B02/**"
      - ".github/objectives/java-1Z0-829.json"
      - ".github/objectives/java-1Z0-830.json"
      - ".github/workflows/java-b02-proof.yml"
  push:
    branches:
      - main
    paths:
      - "10_CONCEPTS/Java/Core/Java Control Flow and Pattern Switch.md"
      - "30_CERTIFICATIONS/Java/JAVA-B02/**"
      - "50_LABS/Java/JAVA-B02/**"
      - ".github/objectives/java-1Z0-829.json"
      - ".github/objectives/java-1Z0-830.json"
      - ".github/workflows/java-b02-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Compile, run and verify expected failures
        run: bash 50_LABS/Java/JAVA-B02/run.sh "${{ matrix.java }}"
