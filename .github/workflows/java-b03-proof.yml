name: JAVA-B03 Proof

on:
  pull_request:
    paths:
      - "10_CONCEPTS/Java/Object Model/**"
      - "30_CERTIFICATIONS/Java/JAVA-B03/**"
      - "50_LABS/Java/JAVA-B03/**"
      - ".github/objectives/java-1Z0-829.json"
      - ".github/objectives/java-1Z0-830.json"
      - ".github/workflows/java-b03-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - "17"
          - "21"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Compile, run and verify expected failures
        run: bash 50_LABS/Java/JAVA-B03/run.sh "${{ matrix.java }}"
