name: Finalize AOP Cache Normalization

on:
  push:
    branches:
      - agent/knowledge-map-foundation
    paths:
      - .github/scripts/finalize_aop_cache_normalization.py
      - .github/workflows/finalize-aop-cache-normalization.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout learning branch
        uses: actions/checkout@v4
        with:
          ref: agent/knowledge-map-foundation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply final normalization repairs
        run: python .github/scripts/finalize_aop_cache_normalization.py

      - name: Commit normalized content
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No finalization changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "30_CERTIFICATIONS/Spring/2V0-72.22/CACHE-B01/CACHE-B01 Cards.md" \
            "99_AUDITS/Obsidian Learning Vault Quality Audit.md"
          git commit -m "docs: finalize AOP and Cache normalization status"
          git pull --rebase origin agent/knowledge-map-foundation
          git push origin HEAD:agent/knowledge-map-foundation
