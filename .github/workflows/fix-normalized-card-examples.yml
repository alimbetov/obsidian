name: Fix Normalized Card Examples

on:
  push:
    branches:
      - agent/knowledge-map-foundation
    paths:
      - .github/scripts/fix_normalized_card_examples.py
      - .github/workflows/fix-normalized-card-examples.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout learning branch
        uses: actions/checkout@v4
        with:
          ref: agent/knowledge-map-foundation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply repair
        run: python .github/scripts/fix_normalized_card_examples.py

      - name: Commit repaired card
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No repair required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "30_CERTIFICATIONS/Spring/2V0-72.22/AOP-B01/AOP-B01 Cards.md"
          git commit -m "fix: correct AOP transaction example"
          git pull --rebase origin agent/knowledge-map-foundation
          git push origin HEAD:agent/knowledge-map-foundation
