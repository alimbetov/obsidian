name: Patch JAVA-B03 Metadata

on:
  pull_request:
    branches:
      - agent/java-17-21-certification-tracks
    paths:
      - tools/patch-java-b03-metadata.py
      - .github/workflows/patch-java-b03-metadata.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stacked branch
        uses: actions/checkout@v4
        with:
          ref: agent/java-b03-object-model-record-patterns
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Synchronize manifests and navigation
        run: python tools/patch-java-b03-metadata.py

      - name: Commit synchronized metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/objectives .github/knowledge-routes.json README.md 00_HOME 01_MAPS/Java\ Certification\ Routes.canvas 30_CERTIFICATIONS/Certification\ MOC.md
          if git diff --cached --quiet; then
            echo "JAVA-B03 metadata is already synchronized"
            exit 0
          fi
          git commit -m "docs: register JAVA-B03 route and navigation"
          git push origin HEAD:agent/java-b03-object-model-record-patterns
