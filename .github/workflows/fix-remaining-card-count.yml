name: Fix Remaining Card Count

on:
  push:
    branches:
      - agent/knowledge-map-foundation
    paths:
      - .github/scripts/fix_remaining_card_count.py
      - .github/workflows/fix-remaining-card-count.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout learning branch
        uses: actions/checkout@v4
        with:
          ref: agent/knowledge-map-foundation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Correct audit count
        run: python .github/scripts/fix_remaining_card_count.py

      - name: Commit correction
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No correction required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "99_AUDITS/Obsidian Learning Vault Quality Audit.md"
          git commit -m "docs: correct remaining card normalization count"
          git pull --rebase origin agent/knowledge-map-foundation
          git push origin HEAD:agent/knowledge-map-foundation
